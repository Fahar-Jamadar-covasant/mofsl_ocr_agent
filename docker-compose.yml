version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Agent Application
  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: langgraph-agent
    ports:
      - "9999:9999"
    environment:
      # Agent Configuration
      AGENT_NAME: ${AGENT_NAME:-My Custom Agent}
      AGENT_DESCRIPTION: ${AGENT_DESCRIPTION:-A customizable AI agent}
      HOST: 0.0.0.0
      PORT: 9999
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STREAMING_ENABLED: ${STREAMING_ENABLED:-true}

      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}

      POSTGRES_CONNECTION_STRING: postgresql://postgres:postgres@postgres:5432/agent_db

      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}


      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-1000}

      METRICS_ENABLED: ${METRICS_ENABLED:-true}

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
